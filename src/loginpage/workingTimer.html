<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="workingTimer.css">
    <title>Document</title>
</head>
<body>
    <div class="working-timer-page">
        <div class="work">
            <div class="summary">
                <img src="../assets/images/avatar-default.jpg" alt="">
                <div class="worker-name">김직원</div>
                <div class="worker-rank">사원</div>
            </div>
            <div class="punching-displayer">
                <div class="timer">
                    <p class="current-time">현재시간</p>
                    <p class="current-displayer">8:21</p>
                </div>
                <div class="working-status">
                    <p class="current-status">현재상태</p>
                    <p class="current-displayer">근무 중</p>
                </div>
            </div>
            <button class="puncher">근무종료</button>
        </div>

        <div class="profil-mini">
            <div class="profile-title">Profile</div>
            <div class="ph-section">
                <p class="ph-title">Phone</p>
                <p class="ph-number">01023234343</p>
            </div>
            <div class="rank-section">
                <p class="rank-title">Job</p>
                <p class="rank-name">사원</p>
            </div>
            <div class="email-section">
                <p class="email-title">Emaiil</p>
                <p class="email-address">test@gmail.com</p>
            </div>
        </div>

    </div>
</body>
</html>
